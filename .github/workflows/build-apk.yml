name: Build Android APK

on:
  push:
      branches: [ main, master ]
        workflow_dispatch:

        jobs:
          build:
              name: Build APK
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v4

                                          - name: Set up Java 17
                                                  uses: actions/setup-java@v4
                                                          with:
                                                                    distribution: 'temurin'
                                                                              java-version: '17'

                                                                                    - name: Set up Flutter
                                                                                            uses: subosito/flutter-action@v2
                                                                                                    with:
                                                                                                              flutter-version: '3.22.0'
                                                                                                                        channel: 'stable'
                                                                                                                                  cache: true
                                                                                                                                  
                                                                                                                                        - name: Generate PNG icons and assets
                                                                                                                                                run: |
                                                                                                                                                          python3 << 'PYEOF'
                                                                                                                                                                    import struct, zlib, os
                                                                                                                                                                              def make_png(w, h, r, g, b):
                                                                                                                                                                                            def chunk(name, data):
                                                                                                                                                                                                              c = struct.pack('>I', len(data)) + name + data
                                                                                                                                                                                                                                return c + struct.pack('>I', zlib.crc32(c[4:]) & 0xffffffff)
                                                                                                                                                                                                                                              sig = b'\x89PNG\r\n\x1a\n'
                                                                                                                                                                                                                                                            ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                                                                                                                                                                                                                                                                          row = b'\x00' + bytes([r, g, b]) * w
                                                                                                                                                                                                                                                                                        idat = chunk(b'IDAT', zlib.compress(row * h))
                                                                                                                                                                                                                                                                                                      iend = chunk(b'IEND', b'')
                                                                                                                                                                                                                                                                                                                    return sig + ihdr + idat + iend
                                                                                                                                                                                                                                                                                                                              sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
                                                                                                                                                                                                                                                                                                                                        base = 'android/app/src/main/res'
                                                                                                                                                                                                                                                                                                                                                  for folder, size in sizes.items():
                                                                                                                                                                                                                                                                                                                                                                d = os.path.join(base, folder)
                                                                                                                                                                                                                                                                                                                                                                              os.makedirs(d, exist_ok=True)
                                                                                                                                                                                                                                                                                                                                                                                            png = make_png(size, size, 232, 130, 26)
                                                                                                                                                                                                                                                                                                                                                                                                          for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                                                                                                                                                                                                                                                                                                                                                                                                                            with open(os.path.join(d, name), 'wb') as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                  f.write(png)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    print(f'Created {d}/{name}')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              os.makedirs('assets/images', exist_ok=True)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        os.makedirs('assets/icons', exist_ok=True)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with open('assets/images/logo.png', 'wb') as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                f.write(make_png(100, 100, 232, 130, 26))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print('Done')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    PYEOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Remove XML icon files
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            find android/app/src/main/res -name "ic_launcher.xml" -delete 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      find android/app/src/main/res -name "ic_launcher_round.xml" -delete 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "Cleaned XML files"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: flutter pub get
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Build Release APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: flutter build apk --release --no-tree-shake-icons
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Build Debug APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: flutter build apk --debug --no-tree-shake-icons
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Upload Release APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          name: wehood-member-release-apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    path: build/app/outputs/flutter-apk/app-release.apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Upload Debug APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              name: wehood-member-debug-apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        path: build/app/outputs/flutter-apk/app-debug.apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Show APK info
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: ls -lh build/app/outputs/flutter-apk/*.apk
