name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.6
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create placeholder assets
        run: |
          mkdir -p assets/images assets/icons
          python3 -c "import struct,zlib; f=open('assets/images/logo.png','wb'); sig=b'\x89PNG\r\n\x1a\n'; def c(n,d): r=struct.pack('>I',len(d))+n+d; return r+struct.pack('>I',zlib.crc32(r[4:])&0xffffffff); f.write(sig+c(b'IHDR',struct.pack('>IIBBBBB',1,1,8,2,0,0,0))+c(b'IDAT',zlib.compress(b'\x00\xff\x80\x00'))+c(b'IEND',b'')); f.close(); print('done')"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wehood-member-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wehood-member-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
