name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Create placeholder assets
        run: |
          mkdir -p assets/images assets/icons
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/images/logo.png

      - name: Fix Android icon resources
        run: |
          # 用最小 PNG 替換所有 mipmap 圖標，避免 adaptive-icon XML 問題
          ICON_B64="iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAAGklEQVRoge3BMQEAAADCoPVP7WsIoAAAeAMBxAABCz4MkQAAAABJRU5ErkJggg=="
          for dir in android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi; do
            mkdir -p "$dir"
            echo "$ICON_B64" | base64 -d > "$dir/ic_launcher.png"
            echo "$ICON_B64" | base64 -d > "$dir/ic_launcher_round.png"
          done
          # 刪除 adaptive-icon XML 文件
          rm -f android/app/src/main/res/mipmap-hdpi/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-hdpi/ic_launcher_round.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml
          echo "Icons fixed"

      - name: Fix AndroidManifest roundIcon
        run: |
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"||g' android/app/src/main/AndroidManifest.xml
          echo "Manifest fixed"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wehood-member-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wehood-member-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK info
        run: ls -lh build/app/outputs/flutter-apk/*.apk
