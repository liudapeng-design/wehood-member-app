name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - name: Generate icons
        run: |
          python3 -c "
          import struct,zlib,os
          def p(w,h):
            def c(n,d):
              x=struct.pack('>I',len(d))+n+d
              return x+struct.pack('>I',zlib.crc32(x[4:])&0xffffffff)
            return bytes([137,80,78,71,13,10,26,10])+c(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+c(b'IDAT',zlib.compress((bytes([0,232,130,26])*w)*h))+c(b'IEND',b'')
          [os.makedirs(os.path.join('android/app/src/main/res',f),exist_ok=True) or [open(os.path.join('android/app/src/main/res',f,n),'wb').write(p(s,s)) for n in ['ic_launcher.png','ic_launcher_round.png']] for f,s in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]]
          os.makedirs('assets/images',exist_ok=True)
          open('assets/images/logo.png','wb').write(p(100,100))
          print('done')
          "
      - name: Remove XML icons
        run: find android/app/src/main/res -name "*.xml" -path "*/mipmap*" -delete 2>/dev/null; echo ok
      - run: flutter pub get
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: wehood-member-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: wehood-member-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
