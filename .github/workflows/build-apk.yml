name: Build Android APK

on:
  push:
      branches: [ main, master ]
        workflow_dispatch:

        jobs:
          build:
              name: Build APK
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout
                                    uses: actions/checkout@v4

                                          - name: Set up Java 17
                                                  uses: actions/setup-java@v4
                                                          with:
                                                                    distribution: temurin
                                                                              java-version: '17'

                                                                                    - name: Set up Flutter
                                                                                            uses: subosito/flutter-action@v2
                                                                                                    with:
                                                                                                              flutter-version: 3.22.0
                                                                                                                        channel: stable
                                                                                                                                  cache: true
                                                                                                                                  
                                                                                                                                        - name: Generate icons and assets
                                                                                                                                                run: |
                                                                                                                                                          python3 -c "import struct,zlib,os; make_png=lambda w,h,r,g,b: bytes([137,80,78,71,13,10,26,10])+b''.join([struct.pack('>I',len(d))+n+d+struct.pack('>I',zlib.crc32(struct.pack('>I',len(d))+n+d)&0xffffffff) for n,d in [(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0)),(b'IDAT',zlib.compress((bytes([0])+bytes([r,g,b])*w)*h)),(b'IEND',b'')]]); [os.makedirs(os.path.join('android/app/src/main/res',f),exist_ok=True) or [open(os.path.join('android/app/src/main/res',f,n),'wb').write(make_png(s,s,232,130,26)) for n in ['ic_launcher.png','ic_launcher_round.png']] for f,s in {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items()]; os.makedirs('assets/images',exist_ok=True); open('assets/images/logo.png','wb').write(make_png(100,100,232,130,26)); print('Done')"
                                                                                                                                                          
                                                                                                                                                                - name: Remove XML icons
                                                                                                                                                                        run: find android/app/src/main/res -name "*.xml" -path "*/mipmap*" -delete 2>/dev/null; echo done
                                                                                                                                                                        
                                                                                                                                                                              - name: Install dependencies
                                                                                                                                                                                      run: flutter pub get
                                                                                                                                                                                      
                                                                                                                                                                                            - name: Build Release APK
                                                                                                                                                                                                    run: flutter build apk --release --no-tree-shake-icons
                                                                                                                                                                                                    
                                                                                                                                                                                                          - name: Build Debug APK
                                                                                                                                                                                                                  run: flutter build apk --debug --no-tree-shake-icons
                                                                                                                                                                                                                  
                                                                                                                                                                                                                        - name: Upload Release APK
                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                  name: wehood-member-release-apk
                                                                                                                                                                                                                                                            path: build/app/outputs/flutter-apk/app-release.apk
                                                                                                                                                                                                                                                                      retention-days: 30
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                            - name: Upload Debug APK
                                                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                      name: wehood-member-debug-apk
                                                                                                                                                                                                                                                                                                                path: build/app/outputs/flutter-apk/app-debug.apk
                                                                                                                                                                                                                                                                                                                          retention-days: 30
